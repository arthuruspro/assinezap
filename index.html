<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assine pelo WhatsApp</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #ffffff;
      font-family: 'Poppins', sans-serif;
      color: #1a1a1a;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 24px;
    }

    .card {
      width: 100%;
      max-width: 420px;
    }


    h1 {
      font-size: 36px;
      font-weight: 700;
      line-height: 1.2;
      letter-spacing: -0.5px;
      color: #1a1a1a;
      margin-bottom: 12px;
    }

    .subtitle {
      font-size: 17px;
      font-weight: 400;
      color: #555555;
      margin-bottom: 36px;
      line-height: 1.5;
    }

    /* Benefits */
    .benefits {
      list-style: none;
      margin-bottom: 28px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .benefits li {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 17px;
      color: #1a1a1a;
    }

    .check {
      color: #25D366;
      font-size: 18px;
      line-height: 1;
      flex-shrink: 0;
      font-weight: 600;
    }

    /* Price */
    .price {
      font-size: 26px;
      color: #1a1a1a;
      margin-bottom: 32px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .price .check {
      visibility: hidden; /* keeps alignment with list items */
    }

    .price-text {
      font-weight: 500;
    }

    .price-text strong {
      font-weight: 800;
      font-size: 32px;
    }

    /* CTA Button */
    .btn {
      display: block;
      width: 100%;
      padding: 16px;
      background: #25D366;
      color: #ffffff;
      font-family: 'Poppins', sans-serif;
      font-size: 17px;
      border-radius: 10px;
      cursor: pointer;
      text-align: center;
      letter-spacing: 0.1px;
      transition: opacity 0.15s ease;
    }

    .btn:hover { opacity: 0.88; }
    .btn:active { opacity: 0.75; }

    @media (max-width: 480px) {
      h1 { font-size: 29px; }
    }
  </style>
  <!-- Passador de UTM da UTMify -->
  <script
    src="https://cdn.utmify.com.br/scripts/utms/latest.js"
    data-utmify-prevent-xcod-sck
    data-utmify-prevent-subids
    async
    defer
  ></script>

  <!-- Meta Pixel Base -->
  <script>
  !function(f,b,e,v,n,t,s)
  {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
  n.callMethod.apply(n,arguments):n.queue.push(arguments)};
  if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
  n.queue=[];t=b.createElement(e);t.async=!0;
  t.src=v;s=b.getElementsByTagName(e)[0];
  s.parentNode.insertBefore(t,s)}(window, document,'script',
  'https://connect.facebook.net/en_US/fbevents.js');
  fbq('init', '2112230319524429');
  fbq('init', '1961787600889582');
  fbq('track', 'PageView');
  </script>
  <noscript><img height="1" width="1" style="display:none" src="https://www.facebook.com/tr?id=2112230319524429&ev=PageView&noscript=1"/><img height="1" width="1" style="display:none" src="https://www.facebook.com/tr?id=1961787600889582&ev=PageView&noscript=1"/></noscript>

</head>
<body>
  <div class="card">

    <!-- Headline -->
    <h1>Assine contratos na hora <span style="color:#25D366">via WhatsApp</span></h1>

    <!-- Subtitle -->
    <p class="subtitle">Assinatura digital com validade jurídica</p>

    <!-- Benefits -->
    <ul class="benefits">
      <li><span class="check">✓</span> Envio direto pelo WhatsApp</li>
      <li><span class="check">✓</span> Até 100 documentos por mês</li>
      <li><span class="check">✓</span> Certificado de validade jurídica</li>
    </ul>

    <!-- Price -->
    <div class="price">
      <span class="check">✓</span>
      <span class="price-text"><strong>R$49</strong> <span style="font-size:17px;font-weight:400;color:#999999;">/mês</span></span>
    </div>

    <!-- CTA -->
    <a id="checkoutLink" href="https://pay.cakto.com.br/mnzezip_790248" style="text-decoration:none;" onclick="handleCheckout(event, this);">
      <button class="btn">Teste por 7 dias</button>
    </a>

  </div>

  <script>
    function handleCheckout(e, el) {
      e.preventDefault();
      try { fbq('trackSingle', '1961787600889582', 'InitiateCheckout'); } catch(err) {}
      setTimeout(function() {
        window.location.href = el.href; // pega o href já modificado pelo UTMify
      }, 300);
    }
  </script>
</body>
</html>
