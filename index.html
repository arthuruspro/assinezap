<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Assine pelo WhatsApp</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #ffffff;
      font-family: 'Poppins', sans-serif;
      color: #1a1a1a;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 24px;
    }

    .card {
      width: 100%;
      max-width: 420px;
    }


    h1 {
      font-size: 32px;
      font-weight: 700;
      line-height: 1.2;
      letter-spacing: -0.5px;
      color: #1a1a1a;
      margin-bottom: 12px;
      margin-top: 12px;
    }

    /* Mockup */
    .mockup {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }

    .mockup img {
      width: 320px;
      max-width: 100%;
      height: auto;
    }

    /* Benefits */
    .benefits {
      list-style: none;
      margin-bottom: 28px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .benefits li {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 18px;
      color: #1a1a1a;
    }

    .check {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      width: 22px;
      height: 22px;
    }

    /* Price */
    .price {
      font-size: 27px;
      color: #1a1a1a;
      margin-bottom: 32px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .price .check {
      visibility: hidden;
    }

    .price-text {
      font-weight: 500;
    }

    .price-text strong {
      font-weight: 800;
      font-size: 34px;
    }

    /* CTA Button */
    .btn {
      display: block;
      width: 100%;
      padding: 16px;
      background: #25D366;
      color: #ffffff;
      font-family: 'Poppins', sans-serif;
      font-size: 20px;
      font-weight: 700;
      border-radius: 10px;
      cursor: pointer;
      text-align: center;
      letter-spacing: 0.1px;
      transition: opacity 0.15s ease;
    }

    .btn:hover { opacity: 0.88; }
    .btn:active { opacity: 0.75; }

    @media (max-width: 480px) {
      h1 { font-size: 26px; }
    }
  </style>
  <!-- Passador de UTM da UTMify -->
  <script

</head>
<body>
  <div class="card">

    <!-- Headline -->
    <h1>Pare de perder vendas na hora de assinar contratos</h1>

    <!-- Mockup -->
    <div class="mockup">
      <img src="https://raw.githubusercontent.com/arthuruspro/assinezap/main/demonstracao.webp" alt="Demonstração do AssineZap: contrato sendo assinado pelo WhatsApp com um toque" />
    </div>

    <!-- Benefits -->
    <ul class="benefits">
      <li><span class="check"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#25D366" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11V6a2 2 0 0 1 4 0v5"/><path d="M13 11V9a2 2 0 0 1 4 0v2"/><path d="M17 11a2 2 0 0 1 4 0v3a8 8 0 0 1-8 8H9a8 8 0 0 1-8-8v-1a2 2 0 0 1 4 0"/></svg></span> Seu cliente assina com 1 toque</li>
      <li><span class="check"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#25D366" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg></span> Certificado com validade jurídica</li>
      <li><span class="check"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#25D366" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg></span> Até 100 contratos por mês</li>
    </ul>

    <!-- CTA -->
    <a id="checkoutLink" href="https://pay.cakto.com.br/mnzezip_790248" style="text-decoration:none;" onclick="handleCheckout(event, this);">
      <button class="btn">Teste por R$49<span style="font-size:14px;font-weight:400;opacity:0.85;">/mês</span></button>
    </a>

  </div>

  <script>
    function handleCheckout(e, el) {
      e.preventDefault();
      try { fbq('trackSingle', '1961787600889582', 'InitiateCheckout'); } catch(err) {}
      setTimeout(function() {
